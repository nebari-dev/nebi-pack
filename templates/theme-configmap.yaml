apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nebari-nebi-pack.fullname" . }}-theme-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nebari-nebi-pack.labels" . | nindent 4 }}
data:
  config.json: |
    {
      "title": {{ .Values.theme.title | quote }},
      "logoUrl": {{ .Values.theme.logoUrl | quote }},
      "faviconUrl": {{ .Values.theme.faviconUrl | quote }},
      "theme": {
        "light": {{ .Values.theme.light | default dict | toJson }},
        "dark": {{ .Values.theme.dark | default dict | toJson }}
      }
    }
