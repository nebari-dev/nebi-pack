{{- /*
Secret bootstrap Job — runs as an ArgoCD PreSync hook.

ArgoCD renders Helm templates client-side, so Helm's lookup() always
returns nil and randAlphaNum generates new random values on every sync.
No combination of ArgoCD annotations (IgnoreExtraneous, ServerSideApply=false)
reliably prevents the secret from being overwritten — see:
  https://github.com/argoproj/argo-cd/issues/5202
  https://github.com/argoproj/argo-cd/issues/8551

Instead, we create the secret via an idempotent PreSync Job that runs
before ArgoCD applies the main manifests. The Job only creates the
secret if it doesn't already exist. The secret itself is NOT part of
the Helm-managed resources, so ArgoCD never diffs or overwrites it.
*/}}
{{- $fullname := include "nebari-nebi-pack.fullname" . -}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $fullname }}-secret-init
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nebari-nebi-pack.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $fullname }}-secret-init
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nebari-nebi-pack.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $fullname }}-secret-init
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nebari-nebi-pack.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $fullname }}-secret-init
subjects:
  - kind: ServiceAccount
    name: {{ $fullname }}-secret-init
    namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $fullname }}-secret-init
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nebari-nebi-pack.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/component: secret-init
    spec:
      serviceAccountName: {{ $fullname }}-secret-init
      restartPolicy: OnFailure
      containers:
        - name: init
          image: bitnami/kubectl:latest
          command:
            - sh
            - -ce
            - |
              SECRET_NAME="{{ $fullname }}"

              if kubectl get secret "$SECRET_NAME" 2>/dev/null; then
                echo "Secret $SECRET_NAME already exists, skipping."
                exit 0
              fi

              JWT_SECRET=$(head -c 32 /dev/urandom | base64 | tr -d '\n')
              PG_PASSWORD=$(head -c 18 /dev/urandom | base64 | tr -d '\n')

              kubectl create secret generic "$SECRET_NAME" \
                --from-literal="jwt-secret=$JWT_SECRET" \
                --from-literal="postgres-password=$PG_PASSWORD"

              echo "Secret $SECRET_NAME created."
