{{- $fullname := include "nebari-nebi-pack.fullname" . -}}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $fullname -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $fullname }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nebari-nebi-pack.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
    # Prevent ArgoCD from overwriting secrets on every sync.
    # Helm's lookup() is unavailable during ArgoCD's client-side rendering,
    # so random values would be regenerated and applied on every sync.
    # https://argo-cd.readthedocs.io/en/stable/user-guide/compare-options/
    argocd.argoproj.io/compare-options: IgnoreExtraneous
    argocd.argoproj.io/sync-options: Prune=false,Replace=false
type: Opaque
data:
  {{- if $existingSecret }}
  jwt-secret: {{ index $existingSecret.data "jwt-secret" }}
  postgres-password: {{ index $existingSecret.data "postgres-password" }}
  {{- else }}
  jwt-secret: {{ randAlphaNum 32 | b64enc | quote }}
  postgres-password: {{ randAlphaNum 24 | b64enc | quote }}
  {{- end }}
