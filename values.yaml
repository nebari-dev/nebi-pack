# Default values for nebari-nebi-pack.

# =============================================================================
# Nebari Integration
# =============================================================================

# -- Creates a NebariApp CRD that configures routing and auth via nebari-operator.
# Set to `false` when deploying outside of Nebari.
nebariapp:
  # -- Create the NebariApp resource.
  enabled: true
  # -- Cluster hostname for the NebariApp route (e.g. `nebi.your-cluster.example.com`).
  # **Required** when `nebariapp.enabled` is `true`.
  # @default -- `""` (must be set explicitly)
  hostname: ""
  service:
    # -- Name of the Kubernetes Service the NebariApp routes to.
    # @default -- `""` (defaults to Helm release fullname)
    name: ""
    # -- Port on the Service to route traffic to.
    port: 80
  routing:
    routes:
      - pathPrefix: /
    # /api and /docs bypass the gateway OIDC filter so bearer-token API calls
    # (e.g. the jhub-apps environment selector) reach nebi directly; nebi
    # validates the token itself.
    publicRoutes:
      - pathPrefix: /api/
        pathType: PathPrefix
      - pathPrefix: /docs/
        pathType: PathPrefix
  auth:
    # -- Enforce Keycloak authentication at the Envoy Gateway for this app.
    enabled: true
    # -- OIDC provider for authentication.
    provider: keycloak
    # -- Automatically provision a Keycloak OIDC client for this NebariApp.
    provisionClient: true
    # -- redirectURI must match the Envoy Gateway SecurityPolicy callback path.
    # Nebi itself does NOT run an SSO proxy – auth is handled at the gateway
    # (enforceAtGateway: true, the operator default), so oauth2-proxy's
    # /oauth2/callback endpoint is what the IdP redirects back to.
    redirectURI: /oauth2/callback
    # -- OIDC scopes to request.
    scopes:
      - openid
      - profile
      - email
      - groups
    tokenExchange:
      # Allow other NebariApp clients (e.g. JupyterHub) to exchange a user
      # token for a Nebi-audience token in Keycloak. Required by the jhub-apps
      # environment selector and Nebi auto-auth.
      enabled: true
  # -- landingPage controls whether and how this service appears on the Nebari landing page
  # portal (served by nebari-landing / nebari-webapi).
  landingPage:
    # -- Show this service on the Nebari landing page portal.
    enabled: true
    # -- Display name shown on the landing page card.
    displayName: "Nebi"
    # -- Short description shown on the landing page card.
    description: "Manage and share Conda/Pip environments for your Nebari cluster"
    # -- Icon URL for the landing page card.
    icon: "https://raw.githubusercontent.com/nebari-dev/nebi/main/docs/static/img/nebi-icon.png"
    # -- Category label for grouping on the landing page.
    category: "Platform"
    # -- Sort priority on the landing page (lower numbers appear first).
    priority: 10
    # externalUrl: ""  # Override the URL shown on the card (defaults to hostname)
    healthCheck:
      # -- Enable health-check polling for the landing page card status indicator.
      enabled: true
      # -- HTTP path polled for the health check.
      path: /api/v1/health
      # -- Seconds between health-check polls.
      intervalSeconds: 30
      # -- Health-check timeout in seconds.
      timeoutSeconds: 5

# =============================================================================
# Nebi Application
# =============================================================================

# -- Container image for the Nebi server.
image:
  # -- Image repository.
  repository: quay.io/nebari/nebi
  # -- Image tag. Pin to a specific `sha-<hash>` tag for reproducible deployments.
  tag: sha-f4b23ca
  # -- Image pull policy.
  pullPolicy: IfNotPresent

# -- Number of Nebi pod replicas. A single replica is sufficient for most deployments
# because `--mode=both` runs API and worker in the same pod.
replicaCount: 1

# -- Deployment strategy – Recreate avoids Multi-Attach errors on RWO volumes
strategy:
  type: Recreate

# -- Auth configuration (env vars on the Deployment)
auth:
  # -- Keycloak/OIDC groups that grant Nebi admin role
  proxyAdminGroups: "admin,nebi-admin"
  # -- OIDC integration. Enabled by default so a stock Nebari install authenticates
  # against Keycloak with no extra values: issuerURL, clientID and
  # clientSecretName are all derived to match the client the nebari-operator
  # provisions for this NebariApp. Override any field to opt out of the
  # convention. nebi still runs NEBI_AUTH_TYPE=basic and validates the
  # gateway-forwarded OIDC token via the verifier wired in here.
  oidc:
    # -- Enable direct OIDC authentication.
    enabled: true
    # Derived from keycloak.hostname (which defaults to keycloak.<base domain of
    # nebariapp.hostname>) as https://<keycloak.hostname>/realms/nebari.
    # -- OIDC issuer URL (e.g. `https://keycloak.example.com/realms/nebari`).
    issuerURL: ""
    # Optional: separate discovery URL for split-horizon deployments where the
    # public issuerURL is not reachable from in-cluster pods. Nebi fetches
    # .well-known/openid-configuration from this URL while still validating the
    # token "iss" against issuerURL. Defaults to issuerURL when empty.
    # Example: http://keycloak-http.keycloak.svc.cluster.local/realms/nebari
    discoveryURL: ""
    # Derived to match the operator-provisioned client when empty:
    #   clientID         = <release namespace>-<fullname>
    #   clientSecretName = <fullname>-oidc-client
    # -- OIDC client ID.
    clientID: ""
    # -- Name of the Kubernetes Secret containing the OIDC client secret under key `client-secret`.
    clientSecretName: ""

# Keycloak hostname, used only to derive the OIDC issuer URL when
# auth.oidc.issuerURL is not set. Defaults to keycloak.<base domain of
# nebariapp.hostname> (the nebari-operator convention).
keycloak:
  hostname: ""

# -- Server configuration
server:
  # -- Port the Nebi container listens on.
  port: 8460
  # -- Nebi server run mode.
  mode: production

# -- Logging
log:
  # -- Log output format. `json` for structured logs; `text` for human-readable.
  format: json
  # -- Log verbosity level. One of `debug`, `info`, `warn`, `error`.
  level: info

# -- Queue configuration (single pod = in-memory)
queue:
  # -- Queue backend. `memory` is suitable for single-replica deployments (jobs are
  # lost on pod restart). Use `valkey` with the upstream chart for multi-replica setups.
  type: memory

# -- Storage for workspace environments
persistence:
  # -- Enable the environments PersistentVolumeClaim.
  enabled: true
  # -- Size of the environments PVC.
  size: 20Gi
  # -- Access mode. `ReadWriteOnce` is sufficient for a single-replica deployment.
  accessMode: ReadWriteOnce
  # -- StorageClass for the environments PVC. Leave empty to use the cluster default.
  # @default -- `""` (cluster default StorageClass)
  storageClassName: ""
  # -- Mount path inside the Nebi container where workspace environments are stored.
  mountPath: /app/data/environments

# =============================================================================
# Embedded PostgreSQL
# =============================================================================

# -- Embedded PostgreSQL StatefulSet. Disable to use an external database and
# provide the DSN via `NEBI_DATABASE_DSN`.
postgres:
  # -- Deploy the embedded PostgreSQL StatefulSet.
  enabled: true
  # -- PostgreSQL container image.
  image:
    # -- Image repository.
    repository: postgres
    # -- PostgreSQL version.
    tag: "16"
    # -- Image pull policy.
    pullPolicy: IfNotPresent
  storage:
    # -- Size of the PostgreSQL data PVC.
    size: 10Gi
    # -- StorageClass for the PostgreSQL PVC. Leave empty to use the cluster default.
    # @default -- `""` (cluster default StorageClass)
    storageClassName: ""
  # -- Resource requests and limits for the PostgreSQL container.
  # @default -- `{}` (no limits)
  resources: {}

# =============================================================================
# Service
# =============================================================================

# -- Kubernetes Service configuration.
service:
  # -- Service type.
  type: ClusterIP
  # -- Port the Service exposes.
  port: 80
  # -- Target port on the Nebi container.
  targetPort: 8460

# =============================================================================
# Resources
# =============================================================================

# -- Resource requests and limits for the Nebi container.
# @default -- `{}` (no limits set; recommended to set in production)
resources: {}
  # limits:
  #   cpu: 1000m
  #   memory: 1Gi
  # requests:
  #   cpu: 250m
  #   memory: 256Mi

# =============================================================================
# Service Account
# =============================================================================

# -- ServiceAccount configuration.
serviceAccount:
  # -- Create a Kubernetes ServiceAccount for the Nebi Deployment.
  create: true
  # -- Name of the ServiceAccount. Defaults to the Helm release fullname.
  # @default -- `""` (defaults to release fullname)
  name: ""
  # -- Annotations to add to the ServiceAccount (e.g. for IAM role binding).
  annotations: {}

# =============================================================================
# Overrides
# =============================================================================

# -- Override the name portion of Kubernetes resource names.
nameOverride: ""
# -- Override the full name of Kubernetes resources.
fullnameOverride: ""
