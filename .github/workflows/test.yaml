name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create k3d cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: nebi-test

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1

      - name: Install chart
        run: |
          helm install nebi . \
            --set nebariapp.enabled=false \
            --set persistence.storageClassName=standard \
            --set postgres.storage.storageClassName=standard \
            --wait \
            --timeout 5m

      - name: Wait for pods
        run: |
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/instance=nebi --timeout=300s

      - name: Health check
        run: |
          kubectl port-forward svc/nebi-nebari-nebi-pack 8460:80 &
          sleep 5
          curl -sf http://localhost:8460/api/v1/health
